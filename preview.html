<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>电竞外设 - 热门鼠标键盘参数大全</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:#e8e8e8;display:flex;justify-content:center;align-items:flex-start;
  min-height:100vh;padding:20px 0;
}
.phone{
  width:375px;min-height:812px;background:#f5f5f5;border-radius:30px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3),0 0 0 2px #222;overflow:hidden;position:relative;
}

/* ===== QR Overlay ===== */
.qr-overlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(26,26,46,0.97);z-index:99;display:flex;
  align-items:center;justify-content:center;
  transition:opacity 0.4s;
}
.qr-overlay.hidden{opacity:0;pointer-events:none}
.qr-box{
  background:#fff;border-radius:20px;padding:28px 20px;margin:20px;
  text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.3);width:100%;
}
.qr-box .qr-icon{font-size:80px;margin-bottom:8px}
.qr-box .qr-title{font-size:18px;font-weight:700;color:#1a1a2e;margin-bottom:4px}
.qr-box .qr-sub{font-size:12px;color:#999;margin-bottom:16px}
.qr-box input{
  width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:10px;
  font-size:14px;text-align:center;color:#333;outline:none;
}
.qr-box input:focus{border-color:#ff6b35}
.qr-box .btn{
  display:block;width:100%;margin-top:10px;padding:12px 0;
  font-size:15px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#ff6b35,#f7931e);
  border:none;border-radius:24px;cursor:pointer;
}
.qr-box .btn.secondary{
  background:#f0f0f0;color:#1a1a2e;
}
.qr-box .btn-group{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:12px}
.qr-box .btn-group button{
  font-size:11px;padding:6px 12px;border:1px solid #e0e0e0;
  border-radius:14px;background:#fff;color:#666;cursor:pointer;
}
.qr-box .btn-group button:hover{border-color:#ff6b35;color:#ff6b35}
.qr-divider{font-size:12px;color:#ccc;margin:12px 0}

/* ===== Index ===== */
.idx-header{padding:20px 16px 10px;background:#f5f5f5}
.idx-header .title{font-size:26px;font-weight:800;color:#1a1a2e;letter-spacing:1px}
.idx-header .subtitle{font-size:13px;color:#999;margin:4px 0 12px}
.search-bar{
  display:flex;align-items:center;background:#fff;
  border-radius:22px;padding:10px 16px;
  box-shadow:0 1px 8px rgba(0,0,0,0.05);
}
.search-bar .icon{font-size:18px;margin-right:10px}
.search-bar input{flex:1;border:none;outline:none;font-size:14px;color:#333;background:transparent}

.tabs{display:flex;margin:12px 16px 8px;gap:10px}
.tab{
  flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:600;
  color:#888;background:#fff;border-radius:18px;
  box-shadow:0 1px 6px rgba(0,0,0,0.04);cursor:pointer;user-select:none;
  transition:all 0.2s;
}
.tab.active{color:#fff;background:linear-gradient(135deg,#ff6b35,#f7931e);box-shadow:0 4px 14px rgba(255,107,53,0.35)}
.result-count{font-size:12px;color:#aaa;padding:4px 16px}
.result-count b{color:#ff6b35}

.product-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:10px;
  padding:0 12px 60px;
}
.product-card{
  background:#fff;border-radius:14px;overflow:hidden;
  box-shadow:0 1px 8px rgba(0,0,0,0.05);cursor:pointer;
  transition:transform 0.12s;
}
.product-card:active{transform:scale(0.96)}
.card-img-wrap{
  position:relative;width:100%;height:140px;background:#fafafa;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.card-img-wrap img{width:70%;height:70%;object-fit:contain}
.card-img-wrap .fallback{
  font-size:60px;display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;
}
.card-badge{
  position:absolute;top:6px;left:6px;font-size:10px;
  padding:3px 10px;border-radius:10px;color:#fff;
}
.badge-mouse{background:#4a90d9}
.badge-keyboard{background:#7b61ff}
.card-body{padding:10px 12px 14px}
.card-brand{font-size:11px;color:#aaa;margin-bottom:2px}
.card-name{
  font-size:14px;font-weight:700;color:#1a1a2e;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.card-tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.card-tags span{font-size:10px;color:#ff6b35;background:#fff5f0;padding:2px 8px;border-radius:8px}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.card-price{color:#e0483b;font-size:18px;font-weight:800}
.card-price .sym{font-size:11px}
.card-arrow{font-size:11px;color:#bbb}

.empty-state{text-align:center;padding:60px 0}
.empty-state .em{font-size:48px;margin-bottom:10px}
.empty-state .txt{font-size:14px;color:#999}
.empty-state .hint{font-size:12px;color:#ccc;margin-top:6px}

/* ===== Detail ===== */
.back-top{
  position:absolute;top:44px;left:16px;z-index:20;
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;
  text-shadow:0 1px 4px rgba(0,0,0,0.5);padding:4px 8px;
}
.detail-hero{
  position:relative;width:100%;height:280px;
  background:linear-gradient(180deg,#1a1a2e 0%,#2d2d4a 55%,#f5f5f5 100%);
  display:flex;align-items:center;justify-content:center;
}
.detail-hero img{width:60%;height:55%;object-fit:contain;
  filter:drop-shadow(0 10px 16px rgba(0,0,0,0.4));}
.detail-hero .fallback{font-size:100px}
.hero-info{position:absolute;bottom:16px;left:16px;right:16px}
.hero-brand{font-size:12px;color:rgba(255,255,255,0.6);letter-spacing:2px;text-transform:uppercase}
.hero-name{font-size:22px;font-weight:800;color:#fff;margin-top:2px}
.price-card{
  display:flex;align-items:center;justify-content:space-between;
  margin:-16px 14px 0;padding:16px 18px;background:#fff;
  border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,0.1);
  position:relative;z-index:10;
}
.d-price{color:#e0483b}
.d-price .sym{font-size:16px;font-weight:700}
.d-price .val{font-size:30px;font-weight:800}
.d-tags{display:flex;gap:6px}
.d-tags span{font-size:11px;color:#ff6b35;background:#fff5f0;padding:4px 10px;border-radius:12px}

.sec{margin:16px 14px 0;background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 6px rgba(0,0,0,0.03)}
.sec-title{display:flex;align-items:center;font-size:17px;font-weight:700;color:#1a1a2e;margin-bottom:14px}
.sec-dot{width:5px;height:16px;border-radius:3px;margin-right:10px;background:#ff6b35}
.hl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hl-item{display:flex;align-items:center;gap:6px;padding:10px 12px;background:#fafafa;border-radius:10px;font-size:13px;color:#555}
.spec-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0}
.spec-row:last-child{border-bottom:none}
.spec-label{width:130px;font-size:12px;color:#999;flex-shrink:0}
.spec-value{flex:1;font-size:13px;color:#333;font-weight:500;text-align:right}
.desc-text{font-size:14px;color:#666;line-height:1.8}
.related-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;-ms-overflow-style:none;scrollbar-width:none}
.related-scroll::-webkit-scrollbar{display:none}
.related-item{flex-shrink:0;width:90px;text-align:center;cursor:pointer}
.related-item img{width:70px;height:70px;border-radius:10px;background:#fafafa;object-fit:contain}
.related-item .fallback{width:70px;height:70px;border-radius:10px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto}
.related-item .rname{margin-top:6px;font-size:11px;color:#666}
.related-item .rprice{font-size:13px;font-weight:700;color:#e0483b;margin-top:2px}
.bottom-bar{
  display:flex;align-items:center;gap:12px;padding:10px 14px;
  background:#fff;box-shadow:0 -1px 12px rgba(0,0,0,0.05);margin-top:16px;
}
.btn-back{flex:1;text-align:center;padding:12px 0;font-size:14px;color:#666;background:#f5f5f5;border-radius:22px;cursor:pointer;user-select:none}
.btn-share{flex:2;text-align:center;padding:12px 0;font-size:14px;font-weight:600;color:#fff;background:linear-gradient(135deg,#ff6b35,#f7931e);border-radius:22px;cursor:pointer;user-select:none}
.footer-note{text-align:center;padding:10px 0 20px;font-size:11px;color:#ccc}
</style>
</head>

  <div id="pageDetail" style="display:none"></div>

</div>

// ====== 辅助：生成卡片图片HTML ======
function cardImg(p, cls) {
  var emoji = p.c === 'mouse' ? '🖱️' : '⌨️';
  if (p.img) {
    return '<img src="' + p.img + '" alt="' + p.name + '"/>';
  }
  return '<span class="fallback">' + emoji + '</span>';
}

function heroImg(p) {
  var emoji = p.c === 'mouse' ? '🖱️' : '⌨️';
  if (p.img) {
    return '<img src="' + p.img + '" alt="' + p.name + '"/>';
  }
  return '<span class="fallback">' + emoji + '</span>';
}

function relatedImg(p) {
  var emoji = p.c === 'mouse' ? '🖱️' : '⌨️';
  if (p.img) {
    return '<img src="' + p.img + '" alt="' + p.name + '"/>';
  }
  return '<span class="fallback">' + emoji + '</span>';
}

// ====== 列表逻辑 ======
var currentTab = 'all';

function getFiltered() {
  var list = products.slice();
  var kw = (document.getElementById('searchBox') && document.getElementById('searchBox').value || '').trim().toLowerCase();
  if (currentTab !== 'all') list = list.filter(function(p){return p.c === currentTab;});
  if (kw) list = list.filter(function(p){
    return p.name.toLowerCase().indexOf(kw) !== -1 ||
           p.brand.toLowerCase().indexOf(kw) !== -1 ||
           p.model.toLowerCase().indexOf(kw) !== -1 ||
           p.tags.some(function(t){return t.toLowerCase().indexOf(kw) !== -1;});
  });
  list.sort(function(a,b){return a.price - b.price;});
  return list;
}

function renderIndex() {
  var list = getFiltered();
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var p = list[i];
    var badgeCls = p.c === 'mouse' ? 'badge-mouse' : 'badge-keyboard';
    var badgeTxt = p.c === 'mouse' ? '鼠标' : '键盘';
    var tagsHtml = '';
    for (var j = 0; j < p.tags.length; j++) {
      tagsHtml += '<span>' + p.tags[j] + '</span>';
    }
    html += '<div class="product-card" onclick="openDetail(' + p.id + ')">' +
      '<div class="card-img-wrap">' + cardImg(p) +
        '<div class="card-badge ' + badgeCls + '">' + badgeTxt + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="card-brand">' + p.brand + '</div>' +
        '<div class="card-name">' + p.name + '</div>' +
        '<div class="card-tags">' + tagsHtml + '</div>' +
        '<div class="card-footer">' +
          '<div class="card-price"><span class="sym">¥</span>' + p.price + '</div>' +
          '<div class="card-arrow">查看详情 →</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  }
  document.getElementById('productGrid').innerHTML = html;
  document.getElementById('resultCount').innerHTML = list.length ? '共 <b>' + list.length + '</b> 款产品' : '';
  document.getElementById('emptyState').style.display = list.length ? 'none' : 'block';
}

function switchTab(tab, el) {
  currentTab = tab;
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  el.classList.add('active');
  renderIndex();
}

function filterProducts() { renderIndex(); }

// ====== 详情页逻辑 ======
function renderDetail(product) {
  var icons = ['⭐','🔥','💪','✨'];
  var related = [];
  for (var i = 0; i < products.length; i++) {
    if (products[i].c === product.c && products[i].id !== product.id) {
      related.push(products[i]);
    }
  }
  related = related.slice(0, 6);

  // 亮点
  var hlHtml = '';
  for (var j = 0; j < product.hl.length; j++) {
    hlHtml += '<div class="hl-item">' + (icons[j] || '✨') + ' ' + product.hl[j] + '</div>';
  }

  // 参数
  var specsHtml = '';
  for (var k = 0; k < product.specs.length; k++) {
    specsHtml += '<div class="spec-row"><div class="spec-label">' + product.specs[k].l + '</div><div class="spec-value">' + product.specs[k].v + '</div></div>';
  }

  // 标签
  var tagsHtml = '';
  for (var t = 0; t < product.tags.length; t++) {
    tagsHtml += '<span>' + product.tags[t] + '</span>';
  }

  // 推荐
  var relHtml = '';
  for (var r = 0; r < related.length; r++) {
    var rp = related[r];
    relHtml += '<div class="related-item" onclick="openDetail(' + rp.id + ')">' +
      relatedImg(rp) +
      '<div class="rname">' + rp.brand + '</div>' +
      '<div class="rprice">¥' + rp.price + '</div>' +
    '</div>';
  }

  var html = '' +
    '<div class="back-top" onclick="goBack()">← 返回列表</div>' +
    '<div class="detail-hero">' + heroImg(product) +
      '<div class="hero-info">' +
        '<div class="hero-brand">' + product.brand + '</div>' +
        '<div class="hero-name">' + product.name + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="price-card">' +
      '<div class="d-price"><span class="sym">¥</span><span class="val">' + product.price + '</span></div>' +
      '<div class="d-tags">' + tagsHtml + '</div>' +
    '</div>' +
    '<div class="sec">' +
      '<div class="sec-title"><div class="sec-dot"></div>核心亮点</div>' +
      '<div class="hl-grid">' + hlHtml + '</div>' +
    '</div>' +
    '<div class="sec">' +
      '<div class="sec-title"><div class="sec-dot" style="background:#4a90d9"></div>详细参数</div>' +
      specsHtml +
    '</div>' +
    '<div class="sec">' +
      '<div class="sec-title"><div class="sec-dot" style="background:#4cd964"></div>产品描述</div>' +
      '<div class="desc-text">' + product.desc + '</div>' +
    '</div>' +
    '<div class="bottom-bar">' +
      '<div class="btn-back" onclick="goBack()">← 返回列表</div>' +
      '<div class="btn-share" onclick="shareIt(\'' + product.name.replace(/'/g,"\\'") + '\')">📤 分享给朋友</div>' +
    '</div>';

  if (relHtml) {
    html += '<div class="sec">' +
      '<div class="sec-title"><div class="sec-dot" style="background:#ff9500"></div>同类推荐</div>' +
      '<div class="related-scroll">' + relHtml + '</div>' +
    '</div>';
  }
  html += '<div style="height:20px"></div>';

  document.getElementById('pageDetail').innerHTML = html;
}

// ====== 页面切换 ======
function openDetail(id) {
  var product = null;
  for (var i = 0; i < products.length; i++) {
    if (products[i].id === id) { product = products[i]; break; }
  }
  if (!product) { alert('产品不存在'); return; }
  document.getElementById('pageIndex').style.display = 'none';
  var detail = document.getElementById('pageDetail');
  detail.style.display = 'block';
  renderDetail(product);
  document.querySelector('.phone').scrollTop = 0;
}

function goBack() {
  document.getElementById('pageDetail').style.display = 'none';
  document.getElementById('pageDetail').innerHTML = '';
  document.getElementById('pageIndex').style.display = 'block';
  renderIndex();
}

function shareIt(name) {
  var link = location.origin + location.pathname + '?id=' + currentProductId;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(link).then(function(){alert('链接已复制！\n' + link);}).catch(function(){alert('链接：\n' + link);});
  } else {
    prompt('复制此链接分享：', link);
  }
}

// ====== QR入口 ======
var currentProductId = null;

function scanEnter() {
  var id = parseInt(document.getElementById('scanInput').value);
  if (!id || id < 1 || id > 16) { alert('请输入有效商品ID（1–16）'); return; }
  hideOverlay();
  openDetail(id);
}

function quickEnter(id) {
  document.getElementById('scanInput').value = id;
  hideOverlay();
  openDetail(id);
}

function enterHome() {
  hideOverlay();
  document.getElementById('pageIndex').style.display = 'block';
  renderIndex();
}

function hideOverlay() {
  document.getElementById('qrOverlay').classList.add('hidden');
}

// ====== URL参数直达 ======
function checkUrlParams() {
  var params = new URLSearchParams(location.search);
  var id = parseInt(params.get('id'));
  if (id) {
    var product = null;
    for (var i = 0; i < products.length; i++) {
      if (products[i].id === id) { product = products[i]; break; }
    }
    if (product) {
      hideOverlay();
      openDetail(id);
      return;
    }
  }
  if (params.get('view') === 'home') {
    enterHome();
  }
}

// ====== 全局图片错误处理 ======
document.addEventListener('error', function(e) {
  if (e.target.tagName === 'IMG') {
    var parent = e.target.parentElement;
    var isDetail = parent.classList.contains('detail-hero');
    var isRelated = parent.classList.contains('related-item');
    var emoji = '🖱️';
    // 简单判断层级
    if (isDetail) {
      e.target.outerHTML = '<span class="fallback">🖱️</span>';
    } else if (isRelated) {
      e.target.outerHTML = '<span class="fallback" style="width:70px;height:70px;border-radius:10px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:36px;margin:0 auto">🖱️</span>';
    } else {
      e.target.outerHTML = '<span class="fallback">🖱️</span>';
    }
  }
}, true);

// ====== 启动 ======
window.addEventListener('DOMContentLoaded', checkUrlParams);
</script>
